<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrineScan Pro — Temp & Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
  :root {
    --bg: #0a1018; --surface: #161c24; --border: #2d3846;
    --accent: #00d4ff; --accent2: #00ff9d; --text: #e2eaf4; --muted: #6b7c93; --warn: #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans Thai', sans-serif; padding: 15px; }
  .container { max-width: 1000px; margin: 0 auto; }
  
  header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
  .logo-text { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); font-weight: bold; }

  .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; }
  @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
  
  .config-panel { background: rgba(0, 212, 255, 0.05); border: 1px dashed var(--accent); border-radius: 8px; padding: 10px; margin-bottom: 15px; }
  .config-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent2); padding: 8px; border-radius: 4px; font-size: 11px; font-family: 'Space Mono'; margin-top: 5px; }

  /* ช่องกรอกอุณหภูมิ */
  .temp-input-group { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
  .input-field { width: 100%; background: #000; border: 1px solid var(--accent); color: #fff; padding: 12px; border-radius: 6px; font-size: 20px; font-weight: bold; text-align: center; font-family: 'Space Mono'; margin-top: 8px; }
  .input-field:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 10px rgba(0, 255, 157, 0.2); }

  .viewfinder { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); }
  video { width: 100%; height: 100%; object-fit: cover; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
  .grid-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; pointer-events: none; z-index: 10; display: none; }
  .grid-container.show { display: block; }
  .grid-box { width: 100%; height: 100%; border: 2px solid var(--accent2); position: relative; }
  .grid-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: var(--warn); border-radius: 50%; }

  #instructionOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }

  .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-confirm { background: var(--accent2); color: #000; display: none; }
  .btn-confirm.show { display: block; }

  .display-box { height: 80px; border-radius: 8px; margin: 15px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222; border: 1px solid var(--border); }
  
  table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
  th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-text">หน่วยฝึกทหารใหม่ ปตอ.2 พัน.2</div>
    <div style="text-align:right; font-family:'Space Mono'; font-size:12px;">
        <div id="currentDate">01 April 2026</div>
        <div id="clock">00:00:00</div>
    </div>
  </header>

  <div class="config-panel">
      <label style="font-size:10px; font-weight:bold; color:var(--accent)">GOOGLE APPS SCRIPT WEB APP URL:</label>
      <input type="text" id="sheetUrl" class="config-input" placeholder="วาง Web App URL จาก Apps Script..." onchange="saveConfig()">
  </div>

  <div class="main-grid">
    <div class="card">
      <div class="viewfinder" id="vFrame">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="grid-container" id="gridUI"><div class="grid-box"><div class="grid-dot"></div></div></div>
        <div id="instructionOverlay">
            <button class="btn btn-primary" style="width:auto" onclick="initCamera()" id="startBtn">เริ่มต้นสแกน</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="colorResult" class="display-box">
        <span id="levelValue" style="font-size:28px">--</span>
        <span id="levelName" style="font-size:12px; opacity:0.7">READY</span>
      </div>

      <div class="temp-input-group">
        <label style="font-size:11px; font-weight:bold; color:var(--accent)">อุณหภูมิร่างกาย (°C):</label>
        <input type="number" id="bodyTemp" class="input-field" placeholder="36.5" step="0.1" min="30" max="45">
      </div>

      <div style="margin-bottom:15px; padding-left: 10px; border-left: 3px solid var(--accent)">
        <label style="font-size:10px; color:var(--muted)">SOLDIER:</label>
        <div id="displayUserName" style="font-size:18px; color:var(--accent); font-weight:bold;">ยังไม่ระบุชื่อ</div>
      </div>

      <button class="btn btn-confirm" id="btnSave" onclick="confirmSave()">SAVE & CLOUD SYNC</button>
      <div id="syncStatus" style="font-size:10px; text-align:center; margin-top:10px; color:var(--muted)"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>วันที่</th><th>เวลา</th><th>ชื่อ</th><th>Bubble</th><th>Temp</th><th>ผล</th><th>LVL</th></tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", {willReadFrequently: true});

const LEVELS = [
  { lv: 0, name: "ปกติ (ใสมาก)", hex: "#FFFFFF", rgb: [252, 252, 252] },
  { lv: 1, name: "ปกติ (เหลืองอ่อนมาก)", hex: "#FEEFC6", rgb: [254, 239, 198] },
  { lv: 2, name: "ปกติ (เหลืองอ่อน)", hex: "#FDD771", rgb: [253, 215, 113] },
  { lv: 3, name: "เริ่มขาดน้ำ", hex: "#FFB300", rgb: [255, 179, 0] },
  { lv: 4, name: "ขาดน้ำรุนแรง", hex: "#795548", rgb: [121, 85, 72] }
];

let state = "IDLE"; 
let currentName = "";
let currentBuble = ""; 
let currentLV = 0;
let records = JSON.parse(localStorage.getItem('urine_records') || '[]');

document.getElementById('sheetUrl').value = localStorage.getItem('google_sheet_url') || '';

function saveConfig() { localStorage.setItem('google_sheet_url', document.getElementById('sheetUrl').value); }

async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    video.play();
    document.getElementById("instructionOverlay").style.display = "none";
    state = "SCANNING_QR";
    requestAnimationFrame(loop);
}

function loop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

        if (state === "SCANNING_QR") {
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                try {
                    const url = new URL(code.data);
                    currentName = url.searchParams.get('name') || "N/A";
                    currentBuble = url.searchParams.get('Buble') || "-";
                    document.getElementById("displayUserName").innerHTML = currentName + " (Bubble: " + currentBuble + ")";
                    state = "SCANNING_COLOR";
                    document.getElementById("gridUI").classList.add("show");
                    document.getElementById("btnSave").classList.add("show");
                } catch(e) {}
            }
        } else if (state === "SCANNING_COLOR") {
            const cX = canvasElement.width / 2;
            const cY = canvasElement.height / 2;
            const p = canvas.getImageData(cX, cY, 1, 1).data;
            analyzeColor([p[0], p[1], p[2]]);
        }
    }
    requestAnimationFrame(loop);
}

function analyzeColor(rgb) {
    let minD = Infinity;
    let match = LEVELS[0];
    LEVELS.forEach(l => {
        const d = Math.sqrt(Math.pow(rgb[0]-l.rgb[0],2) + Math.pow(rgb[1]-l.rgb[1],2) + Math.pow(rgb[2]-l.rgb[2],2));
        if (d < minD) { minD = d; match = l; }
    });
    currentLV = match.lv;
    document.getElementById("colorResult").style.background = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    document.getElementById("levelValue").textContent = "LV." + match.lv;
    document.getElementById("levelName").textContent = match.name;
    document.getElementById("levelValue").style.color = (rgb[0]+rgb[1]+rgb[2] > 400) ? "#000" : "#fff";
}

async function confirmSave() {
    const tempValue = document.getElementById('bodyTemp').value;
    if (!tempValue) { alert("กรุณากรอกอุณหภูมิก่อนบันทึก"); return; }

    const scriptUrl = document.getElementById('sheetUrl').value;
    const now = new Date();
    const record = {
        date: now.toLocaleDateString('th-TH'),
        time: now.toLocaleTimeString('th-TH'),
        name: currentName,
        buble: currentBuble,
        temp: tempValue + " °C",
        level: currentLV,
        status: LEVELS[currentLV].name
    };

    records.unshift(record);
    localStorage.setItem('urine_records', JSON.stringify(records));
    renderHistory();

    if (scriptUrl) {
        document.getElementById('syncStatus').textContent = "⏳ กำลังส่งข้อมูล...";
        try {
            await fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(record)
            });
            document.getElementById('syncStatus').textContent = "✅ บันทึกลง Sheet สำเร็จ";
            document.getElementById('bodyTemp').value = ''; // ล้างค่าหลังบันทึก
        } catch (err) {
            document.getElementById('syncStatus').textContent = "❌ ส่งข้อมูลไม่สำเร็จ";
        }
    }

    state = "SCANNING_QR";
    document.getElementById("gridUI").classList.remove("show");
    document.getElementById("btnSave").classList.remove("show");
    document.getElementById("displayUserName").textContent = "ยังไม่ระบุชื่อ";
}

function renderHistory() {
    document.getElementById('logBody').innerHTML = records.map(r => `
        <tr><td>${r.date}</td><td>${r.time}</td><td>${r.name}</td><td>${r.buble}</td><td>${r.temp}</td><td>${r.status}</td><td>${r.level}</td></tr>
    `).join('');
}

window.onload = renderHistory;
setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH');
    document.getElementById('currentDate').textContent = now.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'});
}, 1000);
</script>
</body>
</html>
