<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UrineScan Pro — ปตอ.2 พัน.2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
  :root {
    --bg: #0a1018; --surface: #161c24; --border: #2d3846;
    --accent: #00d4ff; --accent2: #00ff9d; --text: #e2eaf4; --muted: #6b7c93; --warn: #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Noto Sans Thai', sans-serif; 
    padding: 10px;
    overflow-x: hidden;
  }
  .container { max-width: 500px; margin: 0 auto; } /* จำกัดความกว้างให้เหมาะกับมือถือ */
  
  header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0 15px; }
  .logo-text { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--accent); font-weight: bold; }

  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 16px; 
    padding: 15px; 
    margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  
  /* ปรับขนาดกล้องให้พอดี iPhone */
  .viewfinder { 
    position: relative; 
    width: 100%; 
    aspect-ratio: 1 / 1; /* บังคับเป็นจตุรัสให้เหมาะกับหน้าจอมือถือ */
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    border: 2px solid var(--border);
  }
  video { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* ขยายภาพให้เต็มกรอบโดยไม่เสียสัดส่วน */
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .photo-preview-wrap { 
    width: 100%; 
    aspect-ratio: 1 / 1; 
    background: #000; 
    border-radius: 12px; 
    overflow: hidden; 
    display: none; 
    margin-bottom: 10px;
  }
  .photo-preview-wrap.show { display: block; border: 2px solid var(--accent2); }
  #photoSnapshot { width: 100%; height: 100%; object-fit: cover; }

  .bottle-guide { 
    position: absolute; top: 50%; left: 50%; 
    transform: translate(-50%, -50%); 
    width: 40%; height: 60%; 
    border: 2px dashed var(--accent2); 
    border-radius: 15px; 
    pointer-events: none; 
    display: none; 
    z-index: 10; 
  }
  .bottle-guide.show { display: block; }

  .status-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: var(--border); color: var(--muted); }
  .status-tag.active { background: var(--accent); color: #000; }

  .input-field { 
    width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
    padding: 15px; border-radius: 10px; font-size: 28px; font-weight: bold; 
    text-align: center; font-family: 'Space Mono'; margin-top: 8px;
    -webkit-appearance: none;
  }

  .btn { 
    width: 100%; padding: 18px; border-radius: 12px; border: none; 
    font-weight: bold; cursor: pointer; font-size: 16px; 
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 5px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-snap { background: var(--warn); color: #000; display: none; }
  .btn-save { background: var(--accent2); color: #000; display: none; margin-top: 15px; }

  /* History Table Mobile */
  .history-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 450px; }
  th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  
  #instructionOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-text">UrineScan // iPhone Ready</div>
    <div style="text-align:right; font-family:'Space Mono'; font-size:10px;">
        <div id="currentDate" style="color:var(--accent)">-- -- ----</div>
        <div id="clock">00:00:00</div>
    </div>
  </header>

  <div class="card">
    <div id="stepTag" class="status-tag">STEP 1: SCAN QR CODE</div>
    <div class="viewfinder" id="vFrame">
      <video id="video" playsinline webkit-playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="bottle-guide" id="bottleGuide"></div>
      <div id="instructionOverlay">
          <button class="btn btn-primary" onclick="initCamera()">TAP TO START CAMERA</button>
      </div>
    </div>
    
    <div class="photo-preview-wrap" id="photoWrap">
      <img id="photoSnapshot" src="">
    </div>

    <button class="btn btn-snap" id="btnSnap" onclick="takePhoto()">📸 SNAP URINE BOTTLE</button>
    <button class="btn" id="btnReset" style="display:none; background:#333; color:#fff;" onclick="resetScanner()">CANCEL / RESCAN</button>
  </div>

  <div class="card">
    <div style="border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 15px;">
      <p style="font-size:10px; color:var(--muted); text-transform:uppercase;">Soldier Name:</p>
      <div id="displayUserName" style="font-size:18px; color:var(--accent); font-weight:700;">WAITING FOR SCAN...</div>
    </div>

    <div id="colorResult" style="height:45px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:#222; border:1px solid var(--border); font-weight:bold; font-size:14px;">COLOR: --</div>

    <div id="tempArea" style="margin-top:15px; opacity: 0.3; pointer-events: none;">
      <p style="font-size:10px; font-weight:bold; color:var(--accent2)">BODY TEMP (°C):</p>
      <input type="number" id="bodyTemp" class="input-field" placeholder="36.5" step="0.1" inputmode="decimal">
    </div>

    <button class="btn btn-save" id="btnSave" onclick="confirmSave()">💾 SAVE & SYNC TO CLOUD</button>
    <div id="syncStatus" style="font-size:10px; text-align:center; margin-top:8px; color:var(--muted); font-family:'Space Mono'"></div>
  </div>

  <div class="card history-section">
    <p style="font-size:11px; font-weight:bold; color:var(--accent); margin-bottom:10px;">RECENT LOGS (TOP 5)</p>
    <table>
      <thead>
        <tr><th>TIME</th><th>NAME</th><th>TEMP</th><th>LVL</th></tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script>
const CONFIG_SHEET_URL = 'https://script.google.com/macros/s/AKfycbyZYdeSJA5X5DDTpPwsKAPh3x-vi2hsCV7j3YdJ7tYSAKxIsIblHqzitHg3Huiu3zeu8Q/exec'; 

const video = document.getElementById("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", {willReadFrequently: true});

const LEVELS = [
  { lv: 0, name: "ใส", color: "#ffffff" },
  { lv: 1, name: "เหลืองจาง", color: "#FEEFC6" },
  { lv: 2, name: "เหลือง", color: "#FDD771" },
  { lv: 3, name: "ส้ม/ขาดน้ำ", color: "#FFB300" },
  { lv: 4, name: "น้ำตาล/อันตราย", color: "#795548" }
];

let state = "IDLE"; 
let currentName = "", currentBuble = "", currentLV = 0;
let historyData = JSON.parse(localStorage.getItem('urine_history_v2') || '[]');

async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 1280, height: 720 } 
        });
        video.srcObject = stream;
        video.play();
        document.getElementById("instructionOverlay").style.display = "none";
        state = "SCAN_QR";
        renderHistory();
        requestAnimationFrame(loop);
    } catch(e) { alert("Please allow camera access in Settings > Safari"); }
}

function loop() {
    if (state === "COMPLETED") return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

        if (state === "SCAN_QR") {
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                try {
                    const url = new URL(code.data);
                    currentName = url.searchParams.get('name') || "Unknown";
                    currentBuble = url.searchParams.get('Buble') || "-";
                    document.getElementById("displayUserName").textContent = currentName;
                    state = "SNAP_BOTTLE";
                    document.getElementById("btnSnap").style.display = "flex";
                    document.getElementById("btnReset").style.display = "flex";
                    document.getElementById("bottleGuide").classList.add("show");
                    document.getElementById("stepTag").textContent = "STEP 2: SNAP BOTTLE";
                    document.getElementById("stepTag").classList.add("active");
                } catch(e) {}
            }
        } else if (state === "SNAP_BOTTLE") {
            const cX = canvasElement.width / 2, cY = canvasElement.height / 2;
            const p = canvas.getImageData(cX, cY, 1, 1).data;
            updateColorIndicator([p[0], p[1], p[2]]);
        }
    }
    requestAnimationFrame(loop);
}

function updateColorIndicator(rgb) {
    currentLV = (rgb[1] < 110) ? 4 : (rgb[1] < 170) ? 3 : (rgb[1] < 210) ? 2 : (rgb[1] < 240) ? 1 : 0;
    const resBox = document.getElementById("colorResult");
    resBox.style.background = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    resBox.textContent = `LV.${currentLV} - ${LEVELS[currentLV].name}`;
    resBox.style.color = (rgb[0]+rgb[1]+rgb[2] > 400) ? "#000" : "#fff";
}

function takePhoto() {
    document.getElementById("photoSnapshot").src = canvasElement.toDataURL('image/jpeg');
    document.getElementById("vFrame").style.display = "none";
    document.getElementById("photoWrap").classList.add("show");
    document.getElementById("btnSnap").style.display = "none";
    state = "COMPLETED";
    document.getElementById("tempArea").style.opacity = "1";
    document.getElementById("tempArea").style.pointerEvents = "all";
    document.getElementById("btnSave").style.display = "flex";
    document.getElementById("stepTag").textContent = "STEP 3: INPUT TEMP";
}

function resetScanner() {
    location.reload(); // วิธีที่เสถียรที่สุดสำหรับ Safari บน iPhone ในการรีเซ็ตกล้อง
}

async function confirmSave() {
    const tempValue = document.getElementById('bodyTemp').value;
    if (!tempValue) { alert("กรุณากรอกอุณหภูมิ"); return; }

    const record = {
        date: new Date().toLocaleDateString('th-TH'),
        time: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
        name: currentName,
        temp: tempValue,
        level: currentLV,
        status: LEVELS[currentLV].name
    };

    historyData.unshift(record);
    localStorage.setItem('urine_history_v2', JSON.stringify(historyData.slice(0, 5)));
    renderHistory();

    document.getElementById('syncStatus').textContent = "> SYNCING...";
    try {
        await fetch(CONFIG_SHEET_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(record) });
        document.getElementById('syncStatus').textContent = "> SUCCESS!";
        setTimeout(() => location.reload(), 1200);
    } catch (e) { document.getElementById('syncStatus').textContent = "> SYNC ERROR"; }
}

function renderHistory() {
    const body = document.getElementById("historyBody");
    body.innerHTML = historyData.slice(0,5).map(r => `
        <tr>
            <td>${r.time}</td>
            <td style="font-weight:bold">${r.name}</td>
            <td style="color:var(--accent2)">${r.temp}°</td>
            <td><span style="background:${LEVELS[r.level].color}; color:#000; padding:2px 5px; border-radius:4px; font-weight:bold;">LV.${r.level}</span></td>
        </tr>
    `).join('');
}

setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH');
    document.getElementById('currentDate').textContent = now.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'});
}, 1000);
</script>
</body>
</html>
