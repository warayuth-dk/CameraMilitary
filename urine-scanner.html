<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrineScan Pro — Step-by-Step</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
  :root {
    --bg: #0a1018; --surface: #161c24; --border: #2d3846;
    --accent: #00d4ff; --accent2: #00ff9d; --text: #e2eaf4; --muted: #6b7c93; --warn: #ffcc00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans Thai', sans-serif; padding: 15px; }
  .container { max-width: 900px; margin: 0 auto; }
  
  header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
  .logo-text { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); font-weight: bold; }

  .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; }
  @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
  
  .viewfinder { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); transition: 0.3s; }
  
  video { width: 100%; height: 100%; object-fit: cover; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
  .crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; border: 2px dashed rgba(255,255,255,0.5); border-radius: 50%;
    pointer-events: none; z-index: 10; display: none;
  }
  .crosshair.show { display: block; border-color: var(--warn); }

  #instructionOverlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; text-align: center; padding: 20px; border-radius: 8px;
  }
  .step-badge { background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 14px; }

  .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-family: 'Space Mono'; font-size: 16px; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-confirm { background: var(--accent2); color: #000; display: none; }
  .btn-confirm.show { display: block; animation: pulse 1.5s infinite; }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

  .display-box { height: 70px; border-radius: 8px; margin: 15px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; background: #222; border: 1px solid var(--border); }
  
  table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
  th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 400; font-size: 11px; text-transform: uppercase; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-text">URINESCAN // PROTOCOL_V2</div>
    <div id="clock" style="font-family:'Space Mono'; font-size:14px">00:00:00</div>
  </header>

  <div class="main-grid">
    <div class="card">
      <div class="viewfinder" id="vFrame">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="crosshair" id="crosshair"></div>
        
        <div id="instructionOverlay">
            <div class="step-badge" id="stepText">STEP 1: SCAN QR CODE</div>
            <p id="subInstruction" style="font-size: 14px; color: var(--text);">นำ QR Code ของทหารมาวางหน้ากล้อง</p>
            <button class="btn btn-primary" style="margin-top:20px; width: auto;" onclick="initCamera()" id="startBtn">เปิดกล้องเริ่มต้น</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="font-size:10px; color:var(--muted); margin-bottom:10px;">SYSTEM STATUS</div>
      
      <div class="display-box" id="colorResult">
        <span id="levelValue" style="font-size:24px; color:#fff">--</span>
        <span id="levelName" style="font-size:12px; color:rgba(255,255,255,0.6)">รอผลวิเคราะห์สี</span>
      </div>

      <div style="margin-bottom:15px">
        <label style="font-size:11px; color:var(--muted)">ข้อมูลที่สแกนพบ:</label>
        <div id="displayUserName" style="font-size:18px; color:var(--accent); font-weight:bold; margin-top:5px; line-height: 1.2;">
          ยังไม่มีข้อมูล
        </div>
      </div>

      <button class="btn btn-confirm" id="btnSave" onclick="confirmSave()">บันทึกผลตรวจ (SAVE)</button>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>ผลวิเคราะห์</th>
              <th>LVL</th>
              <th style="text-align:center">Bubble</th>
              <th>ชื่อ-นามสกุล</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", {willReadFrequently: true});

// ตั้งค่าเกณฑ์สี 0-4 (ระดับ 0 คือใสเหมือนน้ำเปล่า)
const LEVELS = [
  { lv: 0, name: "ปกติ (ใสมาก)", hex: "#FFFFFF", rgb: [240, 240, 240] },
  { lv: 1, name: "ปกติ (เหลืองอ่อนมาก)", hex: "#FEEFC6", rgb: [254, 239, 198] },
  { lv: 2, name: "ปกติ (เหลืองอ่อน)", hex: "#FDD771", rgb: [253, 215, 113] },
  { lv: 3, name: "เริ่มขาดน้ำ", hex: "#FFB300", rgb: [255, 179, 0] },
  { lv: 4, name: "ขาดน้ำรุนแรง", hex: "#795548", rgb: [121, 85, 72] }
];

let state = "IDLE"; 
let currentName = "";
let currentBuble = ""; 
let currentLV = 0;
let records = JSON.parse(localStorage.getItem('urine_records') || '[]');

async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        await video.play();
        document.getElementById("startBtn").style.display = "none";
        updateState("SCANNING_QR");
        requestAnimationFrame(loop);
    } catch (err) {
        alert("เข้าถึงกล้องไม่ได้: " + err);
    }
}

function updateState(newState) {
    state = newState;
    const overlay = document.getElementById("instructionOverlay");
    const stepText = document.getElementById("stepText");
    const subText = document.getElementById("subInstruction");
    const crosshair = document.getElementById("crosshair");
    const btnSave = document.getElementById("btnSave");

    if (state === "SCANNING_QR") {
        overlay.style.display = "flex";
        overlay.style.background = "rgba(0,0,0,0.85)";
        stepText.textContent = "STEP 1: SCAN QR CODE";
        stepText.style.background = "var(--accent)";
        subText.textContent = "นำ QR Code ของทหารมาวางหน้ากล้อง";
        crosshair.classList.remove("show");
        btnSave.classList.remove("show");
    } 
    else if (state === "SCANNING_COLOR") {
        stepText.textContent = "✅ สแกนสำเร็จ!";
        stepText.style.background = "var(--accent2)";
        subText.innerHTML = `<b style='color:#00ff9d; font-size:18px;'>พบ: ${currentName} [กลุ่ม ${currentBuble}]</b><br>กรุณานำแก้วปัสสาวะมาจ่อที่เป้าเล็ง`;
        
        setTimeout(() => {
            if(state === "SCANNING_COLOR") {
                overlay.style.display = "none";
                crosshair.classList.add("show");
                btnSave.classList.add("show");
            }
        }, 2500);
    }
}

function loop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

        if (state === "SCANNING_QR") {
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                try {
                    const url = new URL(code.data);
                    const name = url.searchParams.get('name');
                    const buble = url.searchParams.get('Buble'); 

                    if (name || buble) {
                        currentName = name || "ไม่ระบุชื่อ";
                        currentBuble = buble || "-";
                        document.getElementById("displayUserName").innerHTML = 
                            `${currentName} <br><small style="color:var(--muted)">Bubble: ${currentBuble}</small>`;
                        updateState("SCANNING_COLOR");
                    }
                } catch(e) { console.log("Invalid URL"); }
            }
        } 
        else if (state === "SCANNING_COLOR") {
            const centerX = canvasElement.width / 2;
            const centerY = canvasElement.height / 2;
            const p = canvas.getImageData(centerX, centerY, 1, 1).data;
            analyzeColor([p[0], p[1], p[2]]);
        }
    }
    requestAnimationFrame(loop);
}

function analyzeColor(rgb) {
    let minDistance = Infinity;
    let match = LEVELS[0];

    LEVELS.forEach(l => {
        const d = Math.sqrt(Math.pow(rgb[0]-l.rgb[0],2) + Math.pow(rgb[1]-l.rgb[1],2) + Math.pow(rgb[2]-l.rgb[2],2));
        if (d < minDistance) { minDistance = d; match = l; }
    });

    currentLV = match.lv;
    const box = document.getElementById("colorResult");
    box.style.background = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    document.getElementById("levelValue").textContent = "LV." + match.lv;
    document.getElementById("levelName").textContent = match.name;
    // ปรับสีตัวอักษรให้ตัดกับพื้นหลัง (ถ้าสีฉี่สว่างให้ฟอนต์ดำ ถ้าเข้มให้ฟอนต์ขาว)
    document.getElementById("levelValue").style.color = (rgb[0]+rgb[1]+rgb[2] > 400) ? "#000" : "#fff";
}

function confirmSave() {
    const record = {
        time: new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}),
        name: currentName,
        buble: currentBuble,
        level: currentLV,
        color: LEVELS.find(l => l.lv === currentLV).hex,
        status: LEVELS.find(l => l.lv === currentLV).name
    };
    records.unshift(record);
    localStorage.setItem('urine_records', JSON.stringify(records));
    renderHistory();
    
    currentName = "";
    currentBuble = "";
    document.getElementById("displayUserName").textContent = "ยังไม่มีข้อมูล";
    updateState("SCANNING_QR");
}

function renderHistory() {
    document.getElementById('logBody').innerHTML = records.map(r => `
        <tr>
            <td>${r.time}</td>
            <td><span class="dot" style="background:${r.color}"></span> ${r.status}</td>
            <td><strong>${r.level}</strong></td>
            <td style="text-align:center; font-weight:bold; color:var(--accent)">${r.buble}</td>
            <td>${r.name}</td>
        </tr>
    `).join('');
}

window.onload = renderHistory;
setInterval(() => { 
    if(document.getElementById('clock'))
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH'); 
}, 1000);
</script>
</body>
</html>
